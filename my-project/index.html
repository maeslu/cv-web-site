<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hleb Zubrytskyi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <div class="name-block">
        <h1 class="logo">Hleb Zubrytskyi</h1>
        <div class="hero-photo">
            <img src="photos/me.jpeg" alt="Hleb">
        </div>
    </div>

    <nav class="top-nav">
        <div class="nav-item">
            <button class="nav-btn">Info</button>
            <div class="nav-popup">
                <p>From Zaporizhzhya</p>
                <p>19 y.o.</p>
                <p>Freestyle</p>
                <p>Self-expression</p>
            </div>
        </div>
        <div class="nav-item">
            <button class="nav-btn">Contacts</button>
            <div class="nav-popup contacts-popup">
                <a href="https://t.me/maeslu" target="_blank" class="icon">
                    <svg viewBox="0 0 24 24"><path d="M22 3L2 11l5 2 2 6 3-5 5 4z"/></svg>
                </a>
                <a href="https://instagram.com/gle9310" target="_blank" class="icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1"/>
                    </svg>
                </a>
                <a href="https://github.com/maeslu" target="_blank" class="icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6 2 2 6 2 12c0 5 3 9 7 10 .5 0 .7-.2.7-.5v-2c-3 .7-3.6-1.2-3.6-1.2-.5-1-.9-1.3-.9-1.3-.7-.5.1-.5.1-.5.8.1 1.2.8 1.2.8.7 1.2 1.9.9 2.4.7.1-.5.3-.9.5-1.1-2.4-.3-5-1.2-5-5.3 0-1.2.4-2.1 1.1-2.9-.1-.3-.5-1.5.1-3 0 0 .9-.3 3 .9.9-.2 1.8-.3 2.7-.3s1.8.1 2.7.3c2.1-1.2 3-.9 3-.9.6 1.5.2 2.7.1 3 .7.8 1.1 1.7 1.1 2.9 0 4.1-2.6 5-5 5.3.3.3.6.8.6 1.7v2.5c0 .3.2.5.7.5 4-1 7-5 7-10 0-6-4-10-10-10z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <div class="hero-center">
        <p class="subtitle">Fashion Designer</p>
        <div class="divider"></div>
        <a class="scroll-down" onclick="scrollToGallery()">↓ catalog</a>
    </div>
</header>

<section class="gallery-section">
    <div class="gallery">
        <div class="item" onclick="openItemInfo('photos/look1.jpeg', 'Snake Shirt', 'Handmade shirt with snake & moon print.')">
            <img src="photos/look1.jpeg">
            <span class="item-label">Snake Shirt</span>
        </div>
        <div class="item" onclick="openItemInfo('photos/look2.jpeg', 'Castle Hood', 'Reconstructed hoodie with cross patchwork.')">
            <img src="photos/look2.jpeg">
            <span class="item-label">Castle Hood</span>
        </div>
        <div class="item" onclick="openItemInfo('photos/hood.jpeg', 'Drain Sweater', 'Mesh overlay sweater with embroidered detail.')">
            <img src="photos/hood.jpeg">
            <span class="item-label">Drain Sweater</span>
        </div>
        <div class="item" onclick="openItemInfo('photos/look4.jpeg', 'Peep Shirt', 'White shirt with gothic cross print.')">
            <img src="photos/look4.jpeg">
            <span class="item-label">Peep Shirt</span>
        </div>
    </div>
</section>

<div class="modal" id="modal" onclick="closeItemInfo()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeItemInfo()">✕</button>
        <img id="modal-img" src="">
        <div class="modal-bottom-panel" id="modal-bottom-panel">
            <div class="modal-bottom-inner">
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
